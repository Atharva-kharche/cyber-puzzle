<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Puzzle AI • Atharva Pradip Kharche</title>
    <link rel="icon" href="data:,">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe Dependencies (Loaded synchronously to ensure availability before app boots) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="overlay active">
        <div class="loader-content">
            <div class="cyber-spinner"></div>
            <h2 class="neon-text">INITIALIZING NEURAL LINK...</h2>
            <p id="loading-status">Booting Camera & AI Models</p>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app-container">
        
        <!-- MEDIA PIPELINE -->
        <video id="webcam" autoplay playsinline muted></video>
        <!-- The offscreen canvas is used strictly for buffering video frames to avoid readback stalls -->
        <canvas id="offscreen-buffer" style="display: none;"></canvas>
        <!-- Main render target -->
        <canvas id="game-canvas"></canvas>

        <!-- HEADS UP DISPLAY (HUD) -->
        <div id="hud" class="glass-panel">
            
            <!-- Top Left: Stats -->
            <div class="hud-section top-left">
                <div class="stat-box">
                    <span class="label">FPS:</span>
                    <span id="fps-counter" class="value cyan">60</span>
                </div>
                <div class="stat-box">
                    <span class="label">SYS:</span>
                    <span id="ai-status" class="value purple">STANDBY</span>
                </div>
                <div class="stat-box">
                    <span class="label">TIME:</span>
                    <span id="timer-display" class="value">00:00</span>
                </div>
                <div class="stat-box">
                    <span class="label">MOVES:</span>
                    <span id="move-counter" class="value">0</span>
                </div>
            </div>

            <!-- Top Right: Branding -->
            <div class="hud-section top-right watermark">
                <div class="brand-text">
                    <span class="brand-sub">MADE BY</span><br>
                    <span class="brand-name neon-text">ATHARVA PRADIP KHARCHE</span>
                </div>
            </div>

            <!-- Bottom Left: Controls -->
            <div class="hud-section bottom-left controls">
                <div class="btn-group">
                    <button id="btn-easy" class="cyber-btn active" data-grid="3">3x3</button>
                    <button id="btn-medium" class="cyber-btn" data-grid="4">4x4</button>
                    <button id="btn-hard" class="cyber-btn" data-grid="5">5x5</button>
                </div>
                <div class="btn-group mt-2">
                    <button id="btn-shuffle" class="cyber-btn action">SHUFFLE</button>
                    <button id="btn-mirror" class="cyber-btn icon">🪞 MIRROR</button>
                    <button id="btn-settings" class="cyber-btn icon">⚙️ CAM</button>
                </div>
            </div>

            <!-- Bottom Right: Meta -->
            <div class="hud-section bottom-right">
                <div class="stat-box right-align">
                    <span class="label">BEST SCORE:</span>
                    <span id="best-score" class="value purple">--</span>
                </div>
                <button id="btn-sound" class="cyber-btn icon mt-2">🔊 SOUND: ON</button>
            </div>
        </div>

        <!-- PAUSE / TRACKING LOST OVERLAY -->
        <div id="pause-overlay" class="overlay hidden glass-panel">
            <h2 class="neon-text warning">TRACKING LOST</h2>
            <p>Please bring your hand back into frame to resume.</p>
        </div>

        <!-- VICTORY OVERLAY -->
        <div id="victory-overlay" class="overlay hidden glass-panel">
            <h1 class="neon-text success">SYSTEM RESTORED</h1>
            <p>Time: <span id="victory-time" class="cyan"></span> | Moves: <span id="victory-moves" class="purple"></span></p>
            <button id="btn-play-again" class="cyber-btn action large mt-4">REBOOT SEQUENCE</button>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Atharva Pradip Kharche | V-Portal Architecture</p>
    </footer>

    <!-- MAIN ENTRY POINT (ES6 MODULE) -->
    <script type="module" src="./app.js"></script>

</body>
</html>
